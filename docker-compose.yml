services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zerobalance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerobalance}
      POSTGRES_DB: ${POSTGRES_DB:-zerobalance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zerobalance}"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-zerobalance}:${POSTGRES_PASSWORD:-zerobalance}@db:5432/${POSTGRES_DB:-zerobalance}
      QDRANT_URL: http://qdrant:6333
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  # frontend service added once the engine gate passes (UI work blocked until then)

volumes:
  pgdata:
  qdrant_data:
